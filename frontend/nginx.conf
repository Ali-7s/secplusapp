server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API requests to the Spring Boot backend
    # BACKEND_URL is set automatically in docker-compose (service name = "backend")
    # On Railway/Render, override with: BACKEND_URL=https://your-backend.railway.app
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeouts — AI generation can take 3–5 minutes
        proxy_connect_timeout 30s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }

    # Angular client-side routing — serve index.html for every non-file path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
