<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="auth-header">
        <mat-icon class="auth-icon">shield</mat-icon>
        <h1>Security+ SY0-701</h1>
        <p>Sign in to continue studying</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">

        @if (error) {
          <div class="auth-error">
            <mat-icon>error</mat-icon>
            <span>{{ error }}</span>
          </div>
        }

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matSuffix>email</mat-icon>
          @if (form.get('email')?.hasError('email') && form.get('email')?.touched) {
            <mat-error>Enter a valid email address</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width submit-btn" [disabled]="form.invalid || loading">
          @if (loading) { <mat-spinner diameter="20"></mat-spinner> }
          @if (!loading) { <mat-icon>login</mat-icon><span>Sign In</span> }
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions class="auth-footer">
      <span>Don't have an account?</span>
      <a mat-button color="primary" routerLink="/register">Create Account</a>
    </mat-card-actions>
  </mat-card>
</div>
