spring.application.name=security-plus-study
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/comptiadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Claude API — set ANTHROPIC_API_KEY as an environment variable, never hardcode
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-6

# CORS — set CORS_ORIGINS env var in production, defaults to localhost for dev
cors.allowed-origins=${CORS_ORIGINS:http://localhost:[*],http://127.0.0.1:[*]}

# JWT — JWT_SECRET must be set in production; must be at least 32 chars (256 bits)
jwt.secret=${JWT_SECRET:change-me-in-production-this-is-just-for-local-development-32-chars-minimum}
jwt.expiration-ms=604800000

# Admin email — this address always gets ROLE_ADMIN on registration
admin.email=alisharif29@gmail.com
